
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Driver Route Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      
      /* Slide-up positioning - Top of screen, overlay header */
      .ab-slideup,
      body .ab-slideup,
      div.ab-slideup {
        position: fixed !important;
        left: 50% !important;
        top: 20px !important;
        bottom: auto !important;
        transform: translateX(-50%) !important;
        -webkit-transform: translateX(-50%) !important;
        max-width: 350px !important;
        width: 85% !important;
        z-index: 99999 !important;
        margin: 0 !important;
      }
      
      /* Lock the icon on the left - prevent it from moving to top */
      .ab-slideup .ab-image-area,
      body .ab-slideup .ab-image-area {
        float: left !important;
        margin-right: 12px !important;
        margin-bottom: 0 !important;
      }
      
      /* Ensure text wraps around the icon */
      .ab-slideup .ab-message-text,
      body .ab-slideup .ab-message-text {
        overflow: hidden !important;
        display: block !important;
      }
      
      /* iOS Safari slideup fix */
      @supports (-webkit-touch-callout: none) {
        .ab-slideup,
        body .ab-slideup {
          transform: translate3d(-50%, 0, 0) !important;
          -webkit-transform: translate3d(-50%, 0, 0) !important;
        }
      }
      
      /* Modal/Drag-and-drop IAMs - ensure they're visible */
      .ab-iam-root:not(.ab-slideup),
      body .ab-iam-root:not(.ab-slideup) {
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        z-index: 99999 !important;
      }
      
      /* Modal backdrop */
      .ab-page-blocker,
      body .ab-page-blocker {
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        z-index: 99998 !important;
      }
      
      /* User switched confirmation animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      
      @keyframes scaleIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      
      .animate-fade-in {
        animation: fadeIn 0.2s ease-out;
      }
      
      .animate-scale-in {
        animation: scaleIn 0.3s ease-out;
      }
    </style>
